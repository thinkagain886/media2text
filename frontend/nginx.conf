# =============================================================================
# Nginx 配置（运行在「frontend」容器内）
# -----------------------------------------------------------------------------
# • 浏览器只访问 frontend 容器（例如宿主机 3000 端口）。
# • 前端页面里的请求若以 /api 开头，由下面 proxy_pass 转到「backend」容器。
# • 在同一 Compose 网络里，服务名 redis / backend / frontend 就是主机名。
# =============================================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 允许上传最大 512MB 的文件
    client_max_body_size 512M;

    # 单页应用：找不到静态文件时退回 index.html，交给 Vue 路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 把 /api/ 开头的请求转发给后端容器 backend 的 8000 端口（与 backend Dockerfile EXPOSE 一致）
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 关闭缓冲，利于 SSE（任务进度）流式推送
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
